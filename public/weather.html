<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima - Francisco Perez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; } 
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white text-gray-800 antialiased min-h-screen overflow-hidden">
    
    <div id="appContainer" class="hidden flex h-screen w-full">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-50 border-r border-gray-200 flex flex-col justify-between flex-shrink-0">
            <div class="p-6">
                <h2 class="text-xl font-bold tracking-tight text-gray-900 mb-8">Mi Espacio</h2>
                <nav class="space-y-2">
                    <a href="index.html" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-200 rounded-md font-medium transition-colors text-sm text-gray-600 text-left">
                        Mis Tareas & Mensajes
                    </a>
                    <a href="photos.html" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-200 rounded-md font-medium transition-colors text-sm text-gray-600 text-left">
                        Galería de Fotos
                    </a>
                    <a href="weather.html" class="w-full flex items-center gap-3 px-3 py-2 bg-gray-200 rounded-md font-medium transition-colors text-sm text-gray-900 text-left">
                        Clima
                    </a>
                </nav>
            </div>
            <div class="p-6 border-t border-gray-200">
                <p id="currentUserDisplay" class="text-sm font-medium text-gray-900 mb-2 truncate">@usuario</p>
                <button id="logoutBtn" class="text-xs font-medium text-red-500 hover:text-red-700 transition-colors">
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen relative overflow-y-auto scrollbar-hide">
            <section class="w-full h-full flex justify-center py-10 px-8">
                <div class="w-full max-w-3xl">
                    
                    <!-- Header -->
                    <div class="mb-10 border-b border-gray-100 pb-6">
                        <h1 class="text-4xl font-bold text-gray-900 tracking-tight">Clima</h1>
                        <p id="currentDate" class="text-gray-500 text-sm mt-2"></p>
                    </div>

                    <!-- Search Input (Notion-like) -->
                    <div class="relative mb-10">
                        <div class="flex items-center gap-3 border-b border-gray-200 focus-within:border-gray-900 transition-colors pb-2">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                            <input type="text" id="cityInput" placeholder="Busca una ciudad..." 
                                class="flex-1 bg-transparent border-none outline-none text-lg placeholder-gray-400">
                            <button id="searchBtn" class="bg-gray-900 text-white px-4 py-1.5 rounded-md font-medium hover:bg-gray-700 transition-colors text-sm">
                                Buscar
                            </button>
                        </div>
                        <!-- Autocomplete -->
                        <ul id="autocompleteList" class="hidden absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg z-30 max-h-60 overflow-y-auto scrollbar-hide">
                        </ul>
                    </div>

                    <!-- Loading State -->
                    <div id="loadingSpinner" class="hidden py-20 text-center">
                        <p class="text-gray-400 italic">Consultando satélites...</p>
                    </div>

                    <!-- Error Message -->
                    <div id="errorMsg" class="hidden mb-6 p-4 bg-red-50 border border-red-100 rounded-md">
                        <p id="errorText" class="text-sm text-red-600 font-medium"></p>
                    </div>

                    <!-- Weather Content -->
                    <div id="weatherContent" class="hidden space-y-8 animate-in fade-in duration-500">
                        
                        <!-- Current Weather Card -->
                        <div class="bg-white border border-gray-100 rounded-xl p-8 shadow-sm">
                            <div class="flex justify-between items-start mb-8">
                                <div>
                                    <h2 id="wCity" class="text-3xl font-bold text-gray-900 leading-tight">--</h2>
                                    <p id="wCountry" class="text-gray-500 text-sm uppercase tracking-wide font-semibold mt-1">--</p>
                                </div>
                                <div id="wIcon" class="text-6xl">☀️</div>
                            </div>

                            <div class="flex items-baseline gap-2 mb-2">
                                <span id="wTemp" class="text-7xl font-bold text-gray-900 tracking-tighter">--</span>
                                <span class="text-3xl text-gray-400 font-medium">°C</span>
                            </div>
                            <p id="wDesc" class="text-gray-600 text-lg capitalize">--</p>

                            <!-- Grid stats -->
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-10 pt-8 border-t border-gray-50">
                                <div>
                                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Sensación</p>
                                    <p id="wFeelsLike" class="text-lg font-semibold text-gray-900">--</p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Humedad</p>
                                    <p id="wHumidity" class="text-lg font-semibold text-gray-900">--</p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Viento</p>
                                    <p id="wWind" class="text-lg font-semibold text-gray-900">--</p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Lluvia</p>
                                    <p id="wRain" class="text-lg font-semibold text-gray-900">--</p>
                                </div>
                            </div>
                        </div>

                        <!-- Forecast -->
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">Pronóstico 5 Días</h3>
                            <div id="forecastGrid" class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                                <!-- Forecast cards injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Recent Searches -->
                    <div id="recentSection" class="mt-12 hidden">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Historial</p>
                        <div id="recentTags" class="flex flex-wrap gap-2">
                        </div>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script src="weather.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Francisco Perez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; } 
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Pinterest-like Masonry Grid */
        .masonry {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        @media (min-width: 1024px) { .masonry { column-count: 4; } }
        
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen overflow-hidden">
    
    <div id="appContainer" class="hidden flex h-screen w-full">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between flex-shrink-0 z-10">
            <div class="p-6">
                <h2 class="text-xl font-bold tracking-tight text-gray-900 mb-8">Mi Espacio</h2>
                <nav class="space-y-2">
                    <a href="index.html" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-100 rounded-md font-medium transition-colors text-sm text-gray-600 text-left">
                        Mis Tareas & Mensajes
                    </a>
                    <a href="photos.html" class="w-full flex items-center gap-3 px-3 py-2 bg-gray-900 text-white shadow-sm rounded-md font-medium transition-colors text-sm text-left">
                        Galería de Fotos
                    </a>
                </nav>
            </div>
            <div class="p-6 border-t border-gray-100">
                <p id="currentUserDisplay" class="text-sm font-medium text-gray-900 mb-2 truncate">@usuario</p>
                <button id="logoutBtn" class="text-xs font-medium text-red-500 hover:text-red-700 transition-colors">
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen relative overflow-y-auto bg-gray-50 scrollbar-hide">
            <section class="w-full p-8 max-w-7xl mx-auto">
                
                <!-- Header -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-10 gap-6">
                    <div>
                        <h1 class="text-4xl font-bold text-gray-900 tracking-tight">Galería</h1>
                        <p class="text-gray-500 mt-2">Comparte tus momentos favoritos con la comunidad</p>
                    </div>
                    <div class="text-right bg-white px-6 py-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
                        <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-1">Total Likes</p>
                        <p id="totalLikesDisplay" class="text-3xl font-black text-pink-500 leading-none">0</p>
                    </div>
                </div>

                <!-- Form -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-10 transition-shadow hover:shadow-md">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Añadir Nueva Foto</h3>
                    <form id="addPhotoForm" class="flex flex-col md:flex-row gap-4">
                        <input type="url" id="photoUrl" placeholder="URL de la imagen (ej: https://...)" required 
                            class="flex-1 px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
                        <input type="text" id="photoTitle" placeholder="Título o descripción" required 
                            class="flex-1 px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
                        <button type="submit" id="addPhotoBtn" class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-medium hover:bg-indigo-700 transition-colors shadow-sm flex-shrink-0 text-sm active:scale-95 transform">
                            Publicar
                        </button>
                    </form>
                    <p id="formError" class="text-red-500 text-xs mt-3 hidden font-medium"></p>
                </div>

                <!-- Gallery Grid -->
                <div id="photosGrid" class="masonry">
                    <!-- Photos will be injected here -->
                </div>
                
                <div id="emptyPhotosMsg" class="text-center py-20 hidden">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <p class="text-gray-500 text-lg font-medium">Aún no hay fotos en la galería.</p>
                    <p class="text-gray-400 text-sm mt-1">Sé el primero en compartir una.</p>
                </div>

            </section>
        </main>
    </div>

    <script src="photos.js"></script>
</body>
</html>

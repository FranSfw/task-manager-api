<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Francisco Perez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; } 
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white text-gray-800 antialiased min-h-screen overflow-hidden">
    
    <div id="appContainer" class="hidden flex h-screen w-full">
        
        <aside class="w-64 bg-gray-50 border-r border-gray-200 flex flex-col justify-between">
            <div class="p-6">
                <h2 class="text-xl font-bold tracking-tight text-gray-900 mb-8">Mi Espacio</h2>
                <nav class="space-y-2">
                    <button id="navTasksBtn" class="w-full flex items-center gap-3 px-3 py-2 bg-gray-200 rounded-md font-medium transition-colors text-sm text-gray-900 text-left">
                        Mis Tareas
                    </button>
                    <button id="navMessagesBtn" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-200 rounded-md font-medium transition-colors text-sm text-gray-600 text-left">
                        Mensajes
                    </button>
                </nav>
            </div>
            <div class="p-6 border-t border-gray-200">
                <p id="currentUserDisplay" class="text-sm font-medium text-gray-900 mb-2 truncate">@usuario</p>
                <button id="logoutBtn" class="text-xs font-medium text-red-500 hover:text-red-700 transition-colors">
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen relative">
            
            <section id="tasksSection" class="w-full h-full flex justify-center py-10 overflow-y-auto">
                <div class="w-full max-w-2xl px-8">
                    <div class="flex justify-between items-end mb-8 border-b border-gray-100 pb-4">
                        <h1 class="text-4xl font-bold text-gray-900 tracking-tight">Tareas</h1>
                    </div>
            
                    <div class="flex items-center mb-8 gap-3">
                        <input type="text" id="taskInput" placeholder="Añadir una nueva tarea..."
                            class="flex-1 px-0 py-2 border-b border-gray-200 focus:outline-none focus:border-gray-900 text-lg transition-colors placeholder-gray-400">
                        <button id="addBtn" class="bg-gray-900 text-white px-4 py-2 rounded-md font-medium hover:bg-gray-700 transition-colors text-sm">
                            Agregar
                        </button>
                    </div>
            
                    <p id="emptyMsg" class="text-gray-400 italic hidden">No hay tareas actualmente. ¡Todo al día!</p>
                    <ul id="taskList" class="space-y-1"></ul>
                </div>
            </section>

            <section id="messagesSection" class="hidden w-full h-full flex">
                
                <div class="w-1/3 border-r border-gray-200 flex flex-col bg-white">
                    <div class="p-4 border-b border-gray-100 flex gap-2">
                        <button id="tabUsersBtn" class="flex-1 py-1.5 text-sm font-medium text-gray-900 bg-gray-100 rounded-md transition-colors">Directos</button>
                        <button id="tabRequestsBtn" class="flex-1 py-1.5 text-sm font-medium text-gray-500 hover:bg-gray-50 rounded-md transition-colors">Solicitudes</button>
                    </div>
                    <ul id="usersList" class="flex-1 overflow-y-auto scrollbar-hide p-2 space-y-1">
                        </ul>
                </div>

                <div class="w-2/3 flex flex-col bg-gray-50 relative">
                    
                    <div id="chatEmptyState" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-10">
                        <h3 class="text-xl font-medium text-gray-900">Tus Mensajes</h3>
                        <p class="text-gray-500 text-sm mt-1">Selecciona un usuario para iniciar una conversación.</p>
                    </div>

                    <div id="chatActiveState" class="hidden flex-1 flex flex-col h-full">
                        <div class="h-16 px-6 border-b border-gray-200 bg-white flex items-center shadow-sm z-20">
                            <h3 id="chatHeaderName" class="font-semibold text-gray-900">Cargando...</h3>
                        </div>

                        <div id="chatWall" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col">
                            </div>

                        <div class="p-4 bg-white border-t border-gray-200">
                            <div class="flex gap-3">
                                <textarea id="messageInput" rows="1" placeholder="Escribe un mensaje..."
                                    class="flex-1 px-4 py-2 bg-gray-100 border-transparent focus:bg-white border focus:border-gray-300 rounded-full focus:outline-none resize-none transition-all"></textarea>
                                <button id="sendMsgBtn" class="bg-gray-900 text-white px-6 font-medium rounded-full hover:bg-gray-800 transition-colors flex-shrink-0">
                                    Enviar
                                </button>
                            </div>
                            <p id="msgError" class="text-xs text-red-500 mt-2 hidden">El mensaje debe tener al menos 5 caracteres.</p>
                        </div>
                    </div>

                </div>
            </section>

        </main>
    </div>

    <script src="msg.js"></script> <script src="app.js"></script> </body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Task Manager - Francisco Perez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex items-center justify-center py-10">
    
    <div class="w-full max-w-md px-8 py-10 bg-white rounded-xl shadow-sm border border-gray-100">
        <h1 class="text-3xl font-bold mb-6 text-gray-900 tracking-tight text-center">Crear Cuenta</h1>
        
        <form id="registerForm" class="flex flex-col gap-4">
            <!-- Username -->
            <div>
                <input type="text" id="usernameInput" placeholder="Nombre de usuario"
                    class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
                <p id="usernameError" class="text-red-500 text-xs mt-1 hidden"></p>
                <p id="usernamePending" class="text-blue-500 text-xs mt-1 hidden">Verificando usuario...</p>
            </div>

            <!-- Nombre -->
            <div>
                <input type="text" id="nombreInput" placeholder="Nombre completo"
                    class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
                <p id="nombreError" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>
            
            <!-- Email -->
            <div>
                <input type="email" id="emailInput" placeholder="Correo electrónico"
                    class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
                <p id="emailError" class="text-red-500 text-xs mt-1 hidden"></p>
                <p id="emailPending" class="text-blue-500 text-xs mt-1 hidden">Verificando email...</p>
            </div>
            
            <!-- Contraseña -->
            <div>
                <input type="password" id="passwordInput" placeholder="Contraseña"
                    class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
                <p id="passwordError" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- Confirmar Contraseña -->
            <div>
                <input type="password" id="confirmPasswordInput" placeholder="Confirmar Contraseña"
                    class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
                <p id="confirmPasswordError" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- Edad -->
            <div>
                <input type="number" id="edadInput" placeholder="Edad" min="1"
                    class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:border-gray-900 transition-colors">
                <p id="edadError" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- Hobbies -->
            <div id="hobbiesContainer" class="border border-gray-100 p-3 rounded-md">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-700">Hobbies</span>
                    <button type="button" id="addHobbieBtn" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">+ Agregar</button>
                </div>
                <div id="hobbiesList" class="flex flex-col gap-2"></div>
                <p id="hobbiesError" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <p id="globalError" class="text-red-500 text-sm hidden text-center"></p>

            <button type="submit" id="submitBtn" disabled
                class="bg-gray-900 text-white px-4 py-2 mt-4 rounded-md font-medium hover:bg-gray-700 transition-colors w-full disabled:opacity-50 disabled:cursor-not-allowed">
                Registrarse
            </button>
            <a href="login.html" class="text-center text-sm text-gray-600 hover:text-gray-900 mt-2 block">
                Ya tengo una cuenta
            </a>
        </form>
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>
